version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: creativeflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creativeflow
    ports:
      - "5432:5432"
    volumes:
      - creativeflow_pgdata:/var/lib/postgresql/data

volumes:
  creativeflow_pgdata:
